on:
  schedule:
    - cron: '0 4 * * *' # Runs every day at 4:00 AM UTC
  workflow_dispatch: {}
jobs:
  tldr-knowledge-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run TLDR article fetch and summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          claude -p "Run today's tech digest per CLAUDE.md" \
            --allowedTools "Bash,Write,WebFetch,mcp__notion__*" \
            --permission-mode dontAsk \
            --output-format stream-json \
            --verbose

      - name: Validate digest.md exists
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        run: |
          if [ ! -f digest.md ]; then
            echo "⚠️ WARNING: digest.md was not generated."
            echo ""
            echo "Feeding back to Claude for debugging..."

            claude -p "digest.md was not generated. Please:
              1. Check if shortlisted_titles.md and shortlisted_articles.md exist
              2. If they exist, run the summarise/ skill on the shortlisted articles
              3. Compile the summaries into a digest.md file
              4. Verify digest.md was created with: ls -lah digest.md
              
              If the files don't exist, please re-run the full workflow from scratch: fetch -> shortlist -> summarise to digest.md." \
              --allowedTools "Bash,Write,WebFetch" \
              --permission-mode dontAsk \
              --output-format stream-json \
              --verbose
          fi

          if [ ! -f digest.md ]; then
            echo "❌ ERROR: digest.md was not generated after feedback to Claude."
            exit 1
          fi

          echo "✅ digest.md was successfully generated."

      - name: Send Telegram digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 utils/notifyUtils.py